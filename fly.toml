# fly.toml
app = "railway-saver"               # your Fly.io app name

[build]
  builder = "paketobuildpacks/builder:base"
  [build.args]
    PYTHON_VERSION = "3.12"

[env]
  # Set environment variables via `fly secrets` (do not put secrets here)
  # Example: fly secrets set BOT_TOKEN=... API_ID=... API_HASH=...

[processes]
  web = "python bot.py"

[[services]]
  internal_port = 8080
  protocol = "tcp"
  processes = ["web"]

  [services.concurrency]
    hard_limit = 25
    soft_limit = 20

  [[services.ports]]
    handlers = ["http"]
    port = 80

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443
