# fly.toml

app = "railway-saver"                 # replace with your actual app name

[build]
  [build.args]
    PYTHON_VERSION = "3.12"

[env]
  # Environment variables are best set via `fly secrets`.
  # Do not hardcode tokens here.

[processes]
  web = "python bot.py"               # the command to run for the web process

[[services]]
  internal_port = 8080                # the port your bot listens on
  protocol = "tcp"
  processes = ["web"]                 # <-- this links the service to the web process

  [services.concurrency]
    hard_limit = 25
    soft_limit = 20

  [[services.ports]]
    handlers = ["http"]
    port = 80

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443
